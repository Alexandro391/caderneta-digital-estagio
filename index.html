<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3aab85">
<link rel="manifest" href="manifest.json">
<title>FMC · Plataforma Integrada</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --med-green: #3aab85; --med-bg: #090f0c; --font-bebas: 'Bebas Neue', cursive; --font-raj: 'Rajdhani', sans-serif; }
  body { margin: 0; background: var(--med-bg); font-family: var(--font-raj); color: white; min-height: 100vh; display: flex; flex-direction: column; }
  
  /* Cabeçalho Estilo CAP */
  .header-plataforma { background: var(--med-bg); padding: 30px 20px; border-bottom: 2px solid var(--med-green); position: relative; }
  .header-plataforma::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--med-green), transparent); }
  .brand-container { display: flex; align-items: center; gap: 12px; }
  .brand-box { border: 1px solid var(--med-green); padding: 4px 10px; color: var(--med-green); font-family: var(--font-bebas); font-size: 22px; }
  .brand-main-title { font-family: var(--font-bebas); font-size: 28px; margin: 0; line-height: 1; letter-spacing: 1px; }
  .brand-sub-title { color: var(--med-green); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  
  .wrap { flex: 1; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
  .cards { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; margin-top: 20px; }
  .rcard { background: rgba(58, 171, 133, 0.05); border: 1px solid rgba(58, 171, 133, 0.2); padding: 20px; border-radius: 4px; text-decoration: none; color: white; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
  .rcard:hover { background: rgba(58, 171, 133, 0.12); border-color: var(--med-green); transform: translateY(-2px); }
  .rcard-icon { font-size: 24px; color: var(--med-green); }
  .rcard-title { font-family: var(--font-bebas); font-size: 20px; letter-spacing: 0.5px; }
  .rcard-sub { font-size: 12px; color: #8FAF94; }
  footer { text-align: center; padding: 20px; font-size: 10px; color: rgba(58, 171, 133, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<header class="header-plataforma">
  <div class="brand-container">
    <div class="brand-box">FMC</div>
    <div class="brand-text-area">
      <h1 class="brand-main-title">PLATAFORMA INTEGRADA</h1>
      <span class="brand-sub-title">Curso de Medicina · Internato</span>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="cards">
    <a href="caderneta-aluno.html" class="rcard">
      <div class="rcard-icon">👨‍⚕️</div>
      <div><div class="rcard-title">SOU ALUNO</div><div class="rcard-sub">Registrar plantões e ver histórico</div></div>
    </a>
    <a href="caderneta-preceptor.html" class="rcard">
      <div class="rcard-icon">🩺</div>
      <div><div class="rcard-title">SOU PRECEPTOR</div><div class="rcard-sub">Validar presenças e gerar tokens</div></div>
    </a>
    <a href="coordenacao.html" class="rcard">
      <div class="rcard-icon">📊</div>
      <div><div class="rcard-title">COORDENAÇÃO</div><div class="rcard-sub">Dashboard e relatórios administrativos</div></div>
    </a>
  </div>
</div>

<footer>SISTEMA DE CADERNETA DIGITAL · FMC 2026</footer>
</body>
</html>
