<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progresso — 20 Encontros</title>
  <style>
    body { background: #05080A; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
    .box { background: #0F1923; padding: 25px; border-radius: 20px; border: 1px solid #1C2E3D; max-width: 450px; margin: auto; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
    .dot { height: 45px; border: 2px solid #1C2E3D; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #3A5570; }
    .dot.on { background: #00C2FF; border-color: #00C2FF; color: black; box-shadow: 0 0 10px #00C2FF; }
    .bar-bg { width: 100%; height: 12px; background: #1C2E3D; border-radius: 6px; overflow: hidden; margin: 15px 0; }
    .bar-fill { height: 100%; background: #00C2FF; width: 0%; transition: 1.5s; }
    h2 { color: #00C2FF; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div style="margin-bottom: 30px;">
    <h2 id="exibeNome">Carregando...</h2>
    <p id="exibeRA" style="opacity: 0.5;">RA: ---</p>
  </div>

  <div class="box">
    <h3>Controle de Estágio</h3>
    <div id="statusTxt" style="font-size: 24px; font-weight: bold; margin-top: 10px;">0 / 20</div>
    <div class="bar-bg"><div id="barra" class="bar-fill"></div></div>
    <div class="grid" id="dotsGrid"></div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxXa9mU4-mjfQX0Ao6E0VPVWxEV2R87L0XYtPf2VzyU_tOitK3combG3lm_Z_ZyhBAI/exec";
    
    const params = new URLSearchParams(window.location.search);
    const ra = params.get("ra");
    const nome = params.get("nome");

    document.getElementById("exibeNome").textContent = decodeURIComponent(nome || "Aluno");
    document.getElementById("exibeRA").textContent = "RA: " + (ra || "---");

    // Criar os 20 círculos
    const grid = document.getElementById("dotsGrid");
    for(let i=1; i<=20; i++) {
      const d = document.createElement("div");
      d.className = "dot"; d.id = "dot"+i; d.textContent = i;
      grid.appendChild(d);
    }

    async function atualizar() {
      if(!ra) return;
      try {
        const r = await fetch(`${API}?action=aluno&ra=${ra}`);
        const data = await r.json();
        const total = data.registros.length;
        
        document.getElementById("statusTxt").textContent = total + " / 20";
        document.getElementById("barra").style.width = (total/20*100) + "%";

        for(let i=1; i<=total; i++) {
          const el = document.getElementById("dot"+i);
          if(el) el.className = "dot on";
        }
      } catch(e) { console.error("Erro ao carregar"); }
    }
    
    window.onload = atualizar;
  </script>
</body>
</html>
