<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estágio</title>
  <style>
    :root { --azul: #00C2FF; --fundo: #05080A; --card: #0F1923; }
    body { background: var(--fundo); color: white; font-family: sans-serif; padding: 20px; }
    .grid-dots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
    .dot { height: 40px; border: 2px solid #1C2E3D; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #3A5570; }
    .dot.active { background: var(--azul); border-color: var(--azul); color: black; font-weight: bold; }
    .progress-bar { width: 100%; height: 10px; background: #1C2E3D; border-radius: 5px; overflow: hidden; }
    .fill { height: 100%; background: var(--azul); width: 0%; transition: 1s; }
  </style>
</head>
<body>

  <h2>Olá, <span id="userNome">...</span></h2>
  <p>RA: <span id="userRA">...</span></p>

  <div style="background: var(--card); padding: 20px; border-radius: 15px;">
    <h3>Progresso do Estágio</h3>
    <div id="progressoTexto">0 / 20 Encontros</div>
    <div class="progress-bar"><div id="barra" class="fill"></div></div>
    
    <div class="grid-dots" id="grid"></div>
  </div>

  <script>
    const URL_API = "SUA_URL_AQUI"; // <--- MESMO LINK DO GOOGLE SCRIPT
    const params = new URLSearchParams(window.location.search);
    const ra = params.get("ra");
    const nome = params.get("nome");

    document.getElementById("userNome").textContent = decodeURIComponent(nome);
    document.getElementById("userRA").textContent = ra;

    // Criar os 20 quadradinhos
    const grid = document.getElementById("grid");
    for(let i=1; i<=20; i++) {
      const d = document.createElement("div");
      d.className = "dot"; d.id = "d"+i; d.textContent = i;
      grid.appendChild(d);
    }

    async function carregar() {
      try {
        const resp = await fetch(`${URL_API}?action=aluno&ra=${ra}`);
        const data = await resp.json();
        const total = data.registros.length;
        
        document.getElementById("progressoTexto").textContent = `${total} / 20 Encontros`;
        document.getElementById("barra").style.width = (total/20*100) + "%";

        for(let i=1; i<=total; i++) {
          document.getElementById("d"+i).className = "dot active";
        }
      } catch(e) { console.error("Erro ao carregar dados"); }
    }
    carregar();
  </script>
</body>
</html>
