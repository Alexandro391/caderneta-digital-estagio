<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caderneta FMC · Aluno</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
// ── CONFIGURAÇÃO ─────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6aS95ywHvv7Zkpt1RuiU6ACVui3i8c7seqxlNjsyL3nBwR5fxOUx284hZkFPvHM8j/exec";
const TOTAL_PLANTOES = 20;

const COR = {
  "5º Período":  { p:"#1D4ED8", l:"#DBEAFE", g:"linear-gradient(135deg,#1D4ED8,#3B82F6)", emoji:"🔵" },
  "6º Período":  { p:"#0891B2", l:"#CFFAFE", g:"linear-gradient(135deg,#0891B2,#22D3EE)", emoji:"🩵" },
  "7º Período":  { p:"#059669", l:"#D1FAE5", g:"linear-gradient(135deg,#059669,#34D399)", emoji:"🟢" },
  "8º Período":  { p:"#166534", l:"#DCFCE7", g:"linear-gradient(135deg,#166534,#16A34A)", emoji:"💚" }
};

const ESPECIALIDADES = {
  "5º Período":  ["Clínica Médica I"],
  "6º Período":  ["Clínica Médica II"],
  "7º Período":  ["Pediatria I","Clínica Cirúrgica","Obstetrícia","Ginecologia","Medicina Intensiva","DIP"],
  "8º Período":  ["Pediatria II","Clínica Cirúrgica II","Urologia","Oftalmologia","Otorrinolaringologia","Dermatologia","Ortopedia e Traumatologia"]
};
</script>
<style>
:root{
  --p:#1D4ED8;--pl:#DBEAFE;--pg:linear-gradient(135deg,#1D4ED8,#3B82F6);
  --fmc-v:#3A7D44;--fmc-vd:#1E5128;--fmc-vl:#D6EDD9;
  --g100:#F1F5F9;--g200:#E2E8F0;--g400:#94A3B8;--g700:#334155;--g900:#0F172A;
  --font:'Sora',sans-serif;--r:16px;--sh:0 4px 24px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--g100);color:var(--g900);min-height:100vh}
.screen{display:none}.screen.on{display:block;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* UI ELEMENTS */
.topbar{color:white;padding:0 18px;height:58px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.22)}
.tb-title{font-size:14px;font-weight:700}
.tb-sub{font-size:10px;opacity:0.7}
.tb-back{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:white;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}

.container{max-width:480px;margin:0 auto;padding:20px 16px}
.card{background:white;border-radius:var(--r);border:1px solid var(--g200);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.card-head{padding:15px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}

/* LOGIN SCREEN */
.login-wrap{min-height:100vh;background:linear-gradient(160deg,#1E5128 0%,#3A7D44 100%);padding:40px 20px}
.banner{text-align:center;color:white;margin-bottom:30px}
.banner h1{font-size:20px;margin-bottom:5px}
.banner p{font-size:12px;opacity:0.7}
.lcard{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);padding:25px;border-radius:20px;border:1px solid rgba(255,255,255,0.2)}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;font-weight:700;margin-bottom:5px;text-transform:uppercase;color:rgba(255,255,255,0.7)}
.fg.lt label{color:var(--g700)}
.fg input, .fg select{width:100%;padding:12px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;font-family:var(--font)}
.fg.lt input, .fg.lt select{background:var(--g100);color:var(--g900);border-color:var(--g200)}
.periodo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.pbtn{padding:10px;border-radius:10px;border:2px solid transparent;background:rgba(255,255,255,0.1);color:white;cursor:pointer;font-size:10px;font-weight:700}
.pbtn.sel{border-color:white;background:rgba(255,255,255,0.3)}

/* PROGRESS HERO */
.hero{border-radius:var(--r);padding:20px;color:white;margin-bottom:16px;position:relative}
.hero-num{font-size:40px;font-weight:800}
.prog-track{height:8px;background:rgba(255,255,255,0.2);border-radius:10px;margin:10px 0}
.prog-fill{height:100%;background:white;border-radius:10px;transition:width 1s}

/* BUTTONS */
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-weight:800;cursor:pointer;font-family:var(--font)}
.btn-login{background:white;color:var(--fmc-vd)}
.btn-p{background:var(--p);color:white}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* HISTÓRICO */
.hrow{padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px}
.hinfo{flex:1}
.hdata{font-size:13px;font-weight:700}
.hlocal{font-size:11px;color:var(--g400)}

.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;color:white;z-index:100}
.loading-overlay.on{display:flex}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">Carregando...</div>

<div id="screen-login" class="screen on">
  <div class="login-wrap">
    <div class="banner">
      <h1>FMC</h1>
      <p>Caderneta Digital de Estágio</p>
    </div>
    <div class="lcard">
      <div class="fg">
        <label>Matrícula (RA)</label>
        <input type="number" id="login-ra" placeholder="Digite seu RA">
      </div>
      <div class="fg">
        <label>Nome Completo</label>
        <input type="text" id="login-nome" placeholder="Seu nome">
      </div>
      <label style="font-size:11px; color:white; margin-bottom:10px; display:block">PERÍODO</label>
      <div class="periodo-grid">
        <button class="pbtn sel" data-p="5º Período" onclick="selPeriodo(this)">5º</button>
        <button class="pbtn" data-p="6º Período" onclick="selPeriodo(this)">6º</button>
        <button class="pbtn" data-p="7º Período" onclick="selPeriodo(this)">7º</button>
        <button class="pbtn" data-p="8º Período" onclick="selPeriodo(this)">8º</button>
      </div>
      <button class="btn btn-login" onclick="fazerLogin()">ACESSAR CADERNETA</button>
    </div>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="topbar" id="tb-menu">
    <div><div class="tb-title" id="tb-nome">—</div><div class="tb-sub" id="tb-sub">—</div></div>
    <button class="tb-back" onclick="sair()">Sair</button>
  </div>
  <div class="container">
    <div id="hero-area"></div>
    <button class="btn btn-p" onclick="irReg()" style="margin-bottom:12px">+ REGISTRAR PLANTÃO</button>
    <div class="card">
      <div class="card-head"><b>Histórico Recente</b></div>
      <div id="lista-hist"></div>
    </div>
  </div>
</div>

<div id="screen-reg" class="screen">
  <div class="topbar" id="tb-reg">
    <div class="tb-title">Novo Registro</div>
    <button class="tb-back" onclick="ir('screen-menu')">Voltar</button>
  </div>
  <div class="container">
    <div class="card">
      <div class="card-body">
        <div class="fg lt"><label>Hospital</label>
          <select id="r-hosp">
            <option value="">Selecionar...</option>
            <option>Hospital Ferreira Machado</option>
            <option>Hospital de Guarus</option>
            <option>Santa Casa</option>
            <option>UPA 24h</option>
          </select>
        </div>
        <div class="fg lt"><label>Especialidade</label><select id="r-setor"></select></div>
        <div class="fg lt"><label>Preceptor</label><input type="text" id="r-prec" placeholder="Nome do Médico"></div>
        <div class="fg lt"><label>Token do Dia</label><input type="password" id="r-token" style="text-align:center; font-size:20px" placeholder="••••"></div>
        <button class="btn btn-p" id="btn-salvar" onclick="salvarPlantao()">CONFIRMAR PRESENÇA</button>
      </div>
    </div>
  </div>
</div>

<script>
let USER = JSON.parse(localStorage.getItem('fmc_user')) || null;
let PERIODO_SEL = "5º Período";

window.onload = () => { if(USER) { loginSucesso(); } };

function ir(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function selPeriodo(btn) {
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  PERIODO_SEL = btn.getAttribute('data-p');
}

function fazerLogin() {
  const ra = document.getElementById('login-ra').value;
  const nome = document.getElementById('login-nome').value;
  if(!ra || !nome) return alert("Preencha tudo!");
  USER = { ra, nome, periodo: PERIODO_SEL };
  localStorage.setItem('fmc_user', JSON.stringify(USER));
  loginSucesso();
}

function loginSucesso() {
  document.getElementById('tb-nome').innerText = USER.nome;
  document.getElementById('tb-sub').innerText = `RA: ${USER.ra} • ${USER.periodo}`;
  document.getElementById('tb-menu').style.background = COR[USER.periodo].p;
  carregarDados();
  ir('screen-menu');
}

async function carregarDados() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=aluno&ra=${USER.ra}`);
    const data = await res.json();
    const lista = data.registros || [];
    renderizarProgresso(lista.length);
    renderizarLista(lista);
  } catch(e) { console.log("Erro ao carregar"); }
}

function renderizarProgresso(qtd) {
  const pct = Math.min(100, (qtd/TOTAL_PLANTOES)*100);
  const cor = COR[USER.periodo];
  document.getElementById('hero-area').innerHTML = `
    <div class="hero" style="background:${cor.g}">
      <div class="hero-num">${qtd}/${TOTAL_PLANTOES}</div>
      <div style="font-size:12px; opacity:0.8">Plantões registrados</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function renderizarLista(lista) {
  const cont = document.getElementById('lista-hist');
  if(lista.length === 0) return cont.innerHTML = '<p style="padding:20px; text-align:center; font-size:12px; color:#999">Nenhum registro.</p>';
  cont.innerHTML = lista.map(r => `
    <div class="hrow">
      <div class="hinfo"><div class="hdata">${r.data}</div><div class="hlocal">${r.hospital}</div></div>
      <div style="font-size:10px; font-weight:bold; color:green">CONFIRMADO</div>
    </div>`).join('');
}

function irReg() {
  const sel = document.getElementById('r-setor');
  const lista = ESPECIALIDADES[USER.periodo] || [];
  sel.innerHTML = lista.map(e => `<option>${e}</option>`).join('');
  document.getElementById('tb-reg').style.background = COR[USER.periodo].p;
  ir('screen-reg');
}

async function salvarPlantao() {
  const btn = document.getElementById('btn-salvar');
  const dados = {
    nome: USER.nome, matricula: USER.ra, periodo: USER.periodo,
    dataEstagio: new Date().toLocaleDateString('pt-BR'),
    diaSemana: new Date().toLocaleDateString('pt-BR', {weekday:'long'}),
    hospital: document.getElementById('r-hosp').value,
    professor: document.getElementById('r-prec').value,
    tokenProfessor: document.getElementById('r-token').value
  };

  if(!dados.hospital || !dados.professor || !dados.tokenProfessor) return alert("Preencha tudo!");

  btn.disabled = true;
  btn.innerText = "PROCESSANDO...";
  document.getElementById('loading').classList.add('on');

  try {
    await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
    alert("Presença Registrada!");
    location.reload(); 
  } catch(e) {
    alert("Erro ao salvar.");
    btn.disabled = false;
  }
}

function sair() { if(confirm("Sair da conta?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
