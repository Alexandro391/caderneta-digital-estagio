<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Caderneta Digital - FMC</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --verde: #00C896; --fundo: #0A0F0D; --superficie: #111A15; --borda: #1E3028; --texto: #E8F5EE; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--fundo); color: var(--texto); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .fmc-header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 480px; border-bottom: 1px solid var(--borda); padding-bottom: 20px; }
    .fmc-logo { width: 100px; height: auto; margin-bottom: 10px; filter: brightness(0) invert(1); }
    .fmc-header h2 { font-size: 16px; color: white; margin-bottom: 4px; }
    .fmc-header .disciplina { font-size: 14px; font-weight: bold; color: var(--verde); margin-top: 8px; }
    .card-aluno { background: var(--superficie); border: 1px solid var(--borda); border-radius: 12px; padding: 15px; width: 100%; max-width: 480px; margin-bottom: 20px; text-align: center; }
    form { width: 100%; max-width: 480px; }
    .campo { margin-bottom: 15px; }
    label { display: block; font-size: 10px; color: var(--verde); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; background: #162019; border: 1px solid var(--borda); border-radius: 8px; color: white; font-size: 15px; }
    .btn { width: 100%; padding: 16px; background: var(--verde); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-progresso { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: var(--verde); font-size: 13px; border: 1px solid var(--verde); padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="fmc-header">
    <img src="https://alexandro391.github.io/caderneta-digital-estagio/imagens/fmc_fbpn.jpg" alt="Logo FMC" class="fmc-logo">
    <h2>FACULDADE DE MEDICINA DE CAMPOS</h2>
    <p class="disciplina">PRÁTICA DE CLÍNICA MÉDICA I</p>
  </div>

  <div class="card-aluno">
    <span style="font-size: 18px; font-weight: bold;" id="exibeNome">Carregando...</span><br>
    <span style="font-size: 13px; opacity: 0.6;" id="exibeRA">RA: ----</span>
  </div>

  <form id="formEstagio">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="campo"><label>Data</label><input type="text" id="dataHoje" readonly></div>
      <div class="campo"><label>Dia</label><input type="text" id="diaSemana" readonly></div>
    </div>
    <div class="campo"><label>Período</label><input type="text" id="periodoAluno" readonly></div>
    <div class="campo">
      <label>Hospital</label>
      <select id="hospital" required>
        <option value="">Selecione...</option>
        <option>Hospital Regional</option><option>Hospital Central</option>
        <option>Santa Casa</option><option>UPA 24h</option>
      </select>
    </div>
    <div class="campo">
      <label>Preceptor</label>
      <select id="professor" required>
        <option value="">Selecione...</option>
        <option>Dr. Marcos Andrade</option><option>Dra. Helena Costa</option>
      </select>
    </div>
    <div class="campo">
      <label>Senha do Dia</label>
      <input type="password" id="senha" placeholder="••••" required style="text-align:center; font-size:20px;">
    </div>
    <button type="submit" id="btnConfirmar" class="btn">CONFIRMAR PRESENÇA</button>
    <a id="linkControle" class="btn-progresso" href="#">VER MEU PROGRESSO</a>
  </form>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxXa9mU4-mjfQX0Ao6E0VPVWxEV2R87L0XYtPf2VzyU_tOitK3combG3lm_Z_ZyhBAI/exec";
    
    // Captura dados da URL
    const urlParams = new URLSearchParams(window.location.search);
    const nomeUrl = urlParams.get("nome");
    const raUrl = urlParams.get("ra");
    const periodoUrl = urlParams.get("periodo") || "5";

    window.onload = () => {
      if (nomeUrl && raUrl) {
        document.getElementById("exibeNome").innerText = decodeURIComponent(nomeUrl);
        document.getElementById("exibeRA").innerText = "RA: " + raUrl;
        document.getElementById("periodoAluno").value = periodoUrl + "º Período";
        // AJUSTE DO BOTÃO PROGRESSO
        document.getElementById("linkControle").href = `controle.html?nome=${nomeUrl}&ra=${raUrl}&periodo=${periodoUrl}`;
      }
      const hoje = new Date();
      document.getElementById("dataHoje").value = hoje.toLocaleDateString('pt-BR');
      const dias = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
      document.getElementById("diaSemana").value = dias[hoje.getDay()];
    };

    document.getElementById("formEstagio").onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnConfirmar");
      btn.disabled = true; // EVITA DUPLICIDADE
      btn.textContent = "PROCESSANDO...";

      const dados = {
        nome: decodeURIComponent(nomeUrl),
        matricula: raUrl,
        periodo: document.getElementById("periodoAluno").value,
        dataEstagio: document.getElementById("dataHoje").value,
        diaSemana: document.getElementById("diaSemana").value,
        hospital: document.getElementById("hospital").value,
        professor: document.getElementById("professor").value,
        tokenProfessor: document.getElementById("senha").value
      };

      try {
        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
        alert("Presença Registrada!");
        // REDIRECIONAMENTO AUTOMÁTICO
        window.location.href = `controle.html?nome=${nomeUrl}&ra=${raUrl}&periodo=${periodoUrl}`;
      } catch (err) {
        alert("Erro ao enviar. Tente novamente.");
        btn.disabled = false;
        btn.textContent = "CONFIRMAR PRESENÇA";
      }
    };
  </script>
</body>
</html>
