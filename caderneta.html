<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderneta Digital - FMC</title>

<style>
:root {
--verde:#00C896;
--fundo:#0A0F0D;
--superficie:#111A15;
--borda:#1E3028;
--texto:#E8F5EE;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--fundo);
color:var(--texto);
font-family:Arial, sans-serif;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.fmc-header{
text-align:center;
margin-bottom:25px;
width:100%;
max-width:480px;
border-bottom:1px solid var(--borda);
padding-bottom:20px;
}

.fmc-logo{
width:100px;
margin-bottom:10px;
}

.card-aluno{
background:var(--superficie);
border:1px solid var(--borda);
border-radius:12px;
padding:15px;
width:100%;
max-width:480px;
margin-bottom:20px;
text-align:center;
}

form{width:100%;max-width:480px;}

.campo{margin-bottom:15px;}

label{
display:block;
font-size:12px;
color:var(--verde);
font-weight:bold;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
background:#162019;
border:1px solid var(--borda);
border-radius:8px;
color:white;
font-size:15px;
}

.btn{
width:100%;
padding:16px;
background:var(--verde);
border:none;
border-radius:10px;
color:#000;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.btn-progresso{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:var(--verde);
border:1px solid var(--verde);
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="fmc-header">
<img src="imagens/fmc_fbpn.jpg" class="fmc-logo">
<h2>FACULDADE DE MEDICINA DE CAMPOS</h2>
<p>PRÁTICA DE CLÍNICA MÉDICA I</p>
</div>

<div class="card-aluno">
<span id="exibeNome">Carregando...</span><br>
<span id="exibeRA">RA: ----</span>
</div>

<form id="formEstagio">

<div class="campo">
<label>Data</label>
<input type="text" id="dataHoje" readonly>
</div>

<div class="campo">
<label>Hospital</label>
<select id="hospital" required>
<option value="">Selecione...</option>
<option>Hospital Regional</option>
<option>Hospital Central</option>
<option>Santa Casa</option>
<option>UPA 24h</option>
</select>
</div>

<div class="campo">
<label>Senha do Dia</label>
<input type="password" id="senha" required>
</div>

<button type="submit" id="btnConfirmar" class="btn">
CONFIRMAR PRESENÇA
</button>

<a id="linkControle" class="btn-progresso">
VER MEU PROGRESSO
</a>

</form>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxXa9mU4-mjfQX0Ao6E0VPVWxEV2R87L0XYtPf2VzyU_tOitK3combG3lm_Z_ZyhBAI/exec";
const REPO="/caderneta-digital-estagio/";

const params=new URLSearchParams(window.location.search);
const nome=params.get("nome");
const ra=params.get("ra");
const periodo=params.get("periodo")||"5";

if(!nome||!ra){
alert("Erro: dados não encontrados na URL.");
}

document.getElementById("exibeNome").innerText=decodeURIComponent(nome||"");
document.getElementById("exibeRA").innerText="RA: "+(ra||"");

document.getElementById("linkControle").href=
REPO+"controle.html?nome="+encodeURIComponent(nome)+"&ra="+ra+"&periodo="+periodo;

document.getElementById("dataHoje").value=
new Date().toLocaleDateString("pt-BR");

document.getElementById("formEstagio").addEventListener("submit",async function(e){
e.preventDefault();

const btn=document.getElementById("btnConfirmar");
btn.disabled=true;
btn.textContent="Processando...";

const dados={
nome:decodeURIComponent(nome),
matricula:ra,
periodo:periodo,
dataEstagio:document.getElementById("dataHoje").value,
hospital:document.getElementById("hospital").value,
tokenProfessor:document.getElementById("senha").value
};

try{
await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(dados)
});

alert("Presença registrada com sucesso!");

window.location.href=
REPO+"controle.html?nome="+encodeURIComponent(nome)+"&ra="+ra+"&periodo="+periodo;

}catch(err){
alert("Erro ao enviar.");
btn.disabled=false;
btn.textContent="CONFIRMAR PRESENÇA";
}
});
</script>

</body>
</html>
