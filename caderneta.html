<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Caderneta Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --verde: #00C896; --fundo: #0A0F0D; --superficie: #111A15; --texto: #E8F5EE; --borda: #1E3028; }
    body { background: var(--fundo); color: var(--texto); font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .card { background: var(--superficie); border: 1px solid var(--borda); border-radius: 16px; padding: 20px; width: 100%; max-width: 450px; margin-bottom: 20px; }
    .periodo-box { background: rgba(0,200,150,0.1); border: 1px dashed var(--verde); padding: 10px; border-radius: 8px; font-size: 12px; text-align: center; margin-top: 10px; color: var(--verde); }
    input, select { width: 100%; padding: 12px; margin: 8px 0; background: #162019; border: 1px solid var(--borda); color: white; border-radius: 8px; }
    .btn { width: 100%; padding: 15px; background: var(--verde); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    .btn:disabled { opacity: 0.5; }
    #nomeExibicao { font-size: 18px; font-weight: bold; color: var(--verde); }
  </style>
</head>
<body>

  <div class="card">
    <div id="nomeExibicao">Carregando Aluno...</div>
    <div id="raExibicao" style="font-family: 'Space Mono'; opacity: 0.7;">RA: ---</div>
    <div class="periodo-box">📅 Período de Estágio: 09/02/2026 a 13/03/2026</div>
  </div>

  <form id="formCaderneta" style="width:100%; max-width:450px;">
    <label>Hospital</label>
    <select id="hospital" required>
      <option value="">Selecione a Unidade...</option>
      <option>Hospital Regional</option>
      <option>Hospital Central</option>
      <option>UPA 24h</option>
    </select>

    <label>Preceptor</label>
    <select id="professor" required>
      <option value="">Selecione o Médico...</option>
      <option>Dr. Marcos Andrade</option>
      <option>Dra. Helena Costa</option>
    </select>

    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-top: 15px;">
      <label style="display:block; text-align:center;">Senha de Validação</label>
      <input type="password" id="senha" placeholder="••••" style="text-align:center; font-size: 24px;" required>
    </div>

    <button type="submit" id="btnEnviar" class="btn">CONFIRMAR PRESENÇA</button>
  </form>

  <script>
    const URL_PLANILHA = "SUA_URL_AQUI"; // <--- COLOQUE SEU LINK AQUI

    const params = new URLSearchParams(window.location.search);
    const nome = params.get("nome") || "Aluno não identificado";
    const ra = params.get("ra") || "0000";

    document.getElementById("nomeExibicao").textContent = decodeURIComponent(nome);
    document.getElementById("raExibicao").textContent = "RA: " + ra;

    document.getElementById("formCaderneta").onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnEnviar");
      btn.disabled = true;
      btn.textContent = "PROCESSANDO...";

      const dados = {
        nome: decodeURIComponent(nome),
        matricula: ra,
        hospital: document.getElementById("hospital").value,
        professor: document.getElementById("professor").value,
        tokenProfessor: document.getElementById("senha").value,
        dataEstagio: new Date().toLocaleDateString('pt-BR'),
        periodo: "5º Período"
      };

      try {
        await fetch(URL_PLANILHA, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
        alert("Presença Registrada! Redirecionando para o Controle...");
        window.location.href = `controle.html?nome=${nome}&ra=${ra}`;
      } catch (err) {
        alert("Erro ao conectar ao servidor.");
        btn.disabled = false;
        btn.textContent = "CONFIRMAR PRESENÇA";
      }
    };
  </script>
</body>
</html>
